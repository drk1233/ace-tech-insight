<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login - Ace Tech Insight</title>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Global & Dashboard CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body class="login-page">

    <div class="login-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="/public/index.html"
                style="font-family: var(--font-mono); font-weight: 700; font-size: 1.5rem; color: var(--text-primary); text-decoration: none; display: inline-block; margin-bottom: 0.5rem;">
                <i class="fas fa-layer-group text-orange"></i> Ace Admin
            </a>
            <p class="text-secondary text-sm">Sign in to manage your content.</p>
        </div>

        <div id="error-message"
            style="display: none; background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center;">
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope text-secondary"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);"></i>
                    <input type="email" id="email" class="form-control" style="padding-left: 2.75rem;" required
                        placeholder="you@example.com">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password" class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock text-secondary"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);"></i>
                    <input type="password" id="password" class="form-control" style="padding-left: 2.75rem;" required
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary btn-block" style="padding: 1rem;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.875rem;">
            <a href="/public/index.html" class="text-secondary hover:text-white" style="text-decoration: none;"><i
                    class="fas fa-arrow-left"></i> Back to Blog</a>
        </div>
    </div>

    <!-- Auth Logic -->
    <script type="module">
        import { login, getSession } from '/js/auth.js';

        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already logged in
            const session = await getSession();
            if (session) {
                window.location.href = '/dashboard/index.html';
            }

            const form = document.getElementById('login-form');
            const errorDiv = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Reset UI
                errorDiv.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';

                try {
                    const { user, error } = await login(email, password);

                    if (error) {
                        throw error;
                    }

                    // Success -> Redirect
                    window.location.href = '/dashboard/index.html';
                } catch (err) {
                    errorDiv.textContent = err.message || 'Invalid email or password.';
                    errorDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            });
        });
    </script>
</body>

</html>
