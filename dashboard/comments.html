<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Comments - Ace Admin</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body class="dashboard-body" style="display: none;">

    <aside class="dashboard-sidebar">
        <div class="sidebar-header">
            <i class="fas fa-layer-group text-orange" style="font-size: 1.5rem;"></i>
            <a href="/public/index.html" class="sidebar-brand" target="_blank">Ace Admin</a>
        </div>

        <div class="sidebar-nav">
            <div class="nav-section-title">Core</div>
            <a href="/dashboard/index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="/dashboard/editor.html" class="nav-item"><i class="fas fa-pen-nib"></i> Write Post</a>
            <a href="/dashboard/posts.html" class="nav-item"><i class="fas fa-file-alt"></i> All Posts</a>
            <a href="/dashboard/categories.html" class="nav-item"><i class="fas fa-folder"></i> Categories</a>

            <div class="nav-section-title">Community</div>
            <a href="/dashboard/comments.html" class="nav-item active"><i class="fas fa-comments"></i> Comments</a>
            <a href="/dashboard/subscribers.html" class="nav-item"><i class="fas fa-users"></i> Subscribers</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left"></div>
            <div class="topbar-right">
                <i class="far fa-bell text-secondary cursor-pointer hover:text-white transition"></i>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="page-header" style="margin-bottom: 1rem;">
                <div>
                    <h1 class="page-title">Manage Comments</h1>
                    <p class="text-secondary">Moderate reader discussions across your articles.</p>
                </div>
            </div>

            <!-- Bulk Actions Toolbar -->
            <div id="bulk-actions" class="panel" style="display: none; padding: 1rem; margin-bottom: 1.5rem; flex-direction: row; gap: 1rem; align-items: center;">
                <span class="text-sm font-semibold"><span id="selected-count">0</span> selected</span>
                <button class="btn btn-outline text-sm text-green" id="btn-bulk-approve" style="border-color: rgba(16,185,129,0.3);"><i class="fas fa-check"></i> Approve</button>
                <button class="btn btn-outline text-sm text-orange" id="btn-bulk-reject" style="border-color: rgba(245,158,11,0.3);"><i class="fas fa-times"></i> Reject</button>
                <button class="btn btn-outline text-sm text-red" id="btn-bulk-delete" style="border-color: var(--accent-red); margin-left: auto;"><i class="fas fa-trash"></i> Delete</button>
            </div>

            <div class="panel">
                <div class="panel-header" style="display: flex; gap: 1rem; flex-wrap: wrap;">

                    <div style="flex: 1; min-width: 200px; position: relative;">
                        <i class="fas fa-search text-secondary"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);"></i>
                        <input type="text" id="search-input" class="form-control text-sm"
                            placeholder="Search authors or content..." style="padding-left: 2.5rem; margin-bottom: 0;">
                    </div>

                    <select id="filter-status" class="form-control text-sm" style="width: auto; margin-bottom: 0;">
                        <option value="pending">Pending Approval</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                        <option value="all">All Comments</option>
                    </select>

                </div>

                <div class="data-table-wrapper">
                    <table class="data-table" id="comments-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="select-all"></th>
                                <th>Author</th>
                                <th>Comment Preview</th>
                                <th>Post</th>
                                <th>Status</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5" class="text-center text-secondary">Loading comments...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { requireAuth } from '/js/auth.js';
        import { getComments, updateCommentStatus, deleteComment } from '/js/api.js';
        import { formatDate } from '/js/utils.js';

        let allComments = [];
        let selectedIds = new Set();

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if (!session) return;
            document.body.style.display = 'flex';

            await loadComments();

            // Bind filters
            document.getElementById('search-input').addEventListener('input', renderTable);
            document.getElementById('filter-status').addEventListener('change', renderTable);

            // Bind Select All
            document.getElementById('select-all').addEventListener('change', (e) => {
                const checked = e.target.checked;
                const checkboxes = document.querySelectorAll('.row-checkbox');
                checkboxes.forEach(cb => {
                    cb.checked = checked;
                    if (checked) selectedIds.add(cb.value);
                    else selectedIds.delete(cb.value);
                });
                updateBulkActions();
            });

            // Bind Bulk Actions
            document.getElementById('btn-bulk-approve').addEventListener('click', () => bulkUpdateStatus('approved'));
            document.getElementById('btn-bulk-reject').addEventListener('click', () => bulkUpdateStatus('rejected'));
            document.getElementById('btn-bulk-delete').addEventListener('click', bulkDelete);
        });

        async function loadComments() {
            // Passing 'all' doesn't filter perfectly in the simplistic getComments signature,
            // so we fetch all without post_id or specific status if possible. 
            // In a real app we'd map this correctly. For now, fetch without constraint via raw Supabase.
            import('/js/supabase.js').then(async ({ supabase }) => {
                const { data } = await supabase.from('comments').select('*, posts(title)').order('created_at', { ascending: false });
                if (data) {
                    allComments = data;
                    renderTable();
                }
            });
        }

        function renderTable() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;

            const filtered = allComments.filter(com => {
                const matchSearch = com.author_name.toLowerCase().includes(searchTerm) || com.content.toLowerCase().includes(searchTerm);
                let matchStatus = true;
                if (statusFilter !== 'all') matchStatus = com.status === statusFilter;

                return matchSearch && matchStatus;
            }).sort((a,b) => {
                if (a.status === 'pending' && b.status !== 'pending') return -1;
                if (a.status !== 'pending' && b.status === 'pending') return 1;
                return new Date(b.created_at || 0).getTime() - new Date(a.created_at || 0).getTime();
            });

            const table = document.getElementById('comments-table').querySelector('tbody');

            if (filtered.length === 0) {
                table.innerHTML = `<tr><td colspan="6" class="text-center text-secondary">No comments found matching criteria.</td></tr>`;
                return;
            }

            table.innerHTML = filtered.map(com => `
                <tr>
                    <td><input type="checkbox" class="row-checkbox" value="${com.id}" ${selectedIds.has(com.id) ? 'checked' : ''}></td>
                    <td style="min-width: 150px;">
                        <div class="font-medium">${com.author_name}</div>
                        <div class="text-xs text-secondary">${com.author_email}</div>
                    </td>
                    <td class="text-sm" style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary);">
                        ${com.content}
                    </td>
                    <td class="text-xs text-secondary" style="max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${com.posts?.title || 'Unknown Post'}
                    </td>
                    <td>
                        <span class="status-badge" style="
                            ${com.status === 'approved' ? 'background: rgba(16,185,129,0.1); color: #10b981;' : ''}
                            ${com.status === 'pending' ? 'background: rgba(245,158,11,0.1); color: #f59e0b;' : ''}
                            ${com.status === 'rejected' ? 'background: rgba(239,68,68,0.1); color: #ef4444;' : ''}
                        ">${com.status}</span>
                    </td>
                    <td style="text-align: right; min-width: 140px;">
                        <div class="flex gap-sm justify-end">
                            ${com.status !== 'approved' ? `<button class="action-btn text-green approve-btn" title="Approve" data-id="${com.id}"><i class="fas fa-check"></i></button>` : ''}
                            ${com.status !== 'rejected' ? `<button class="action-btn text-orange reject-btn" title="Reject" data-id="${com.id}"><i class="fas fa-times"></i></button>` : ''}
                            <button class="action-btn delete delete-btn" title="Delete" data-id="${com.id}"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');

            bindActionButtons();
            
            // Bind check events
            table.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) selectedIds.add(e.target.value);
                    else selectedIds.delete(e.target.value);
                    updateBulkActions();
                });
            });
            
            updateBulkActions();
        }

        function updateBulkActions() {
            const bulkPanel = document.getElementById('bulk-actions');
            const countSpan = document.getElementById('selected-count');
            const selectAll = document.getElementById('select-all');
            
            if (selectedIds.size > 0) {
                bulkPanel.style.display = 'flex';
                countSpan.textContent = selectedIds.size;
            } else {
                bulkPanel.style.display = 'none';
            }
            
            const checkboxes = document.querySelectorAll('.row-checkbox');
            if (checkboxes.length > 0 && selectedIds.size === checkboxes.length) {
                selectAll.checked = true;
            } else {
                selectAll.checked = false;
            }
        }

        async function bulkUpdateStatus(status) {
            if (selectedIds.size === 0) return;
            const ids = Array.from(selectedIds);
            for (let id of ids) {
                await updateCommentStatus(id, status);
                const comment = allComments.find(c => c.id === id);
                if(comment) comment.status = status;
            }
            selectedIds.clear();
            renderTable();
        }
        
        async function bulkDelete() {
            if (selectedIds.size === 0) return;
            if (confirm(`Permanently delete ${selectedIds.size} comments?`)) {
                const ids = Array.from(selectedIds);
                for (let id of ids) {
                    await deleteComment(id);
                    allComments = allComments.filter(c => c.id !== id);
                }
                selectedIds.clear();
                renderTable();
            }
        }

        function bindActionButtons() {
            // Approve
            document.querySelectorAll('.approve-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.currentTarget.dataset.id;
                    const { error } = await updateCommentStatus(id, 'approved');
                    if (!error) updateLocalStatusAndRender(id, 'approved');
                });
            });

            // Reject
            document.querySelectorAll('.reject-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.currentTarget.dataset.id;
                    const { error } = await updateCommentStatus(id, 'rejected');
                    if (!error) updateLocalStatusAndRender(id, 'rejected');
                });
            });

            // Delete
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.currentTarget.dataset.id;
                    if (confirm("Permanently delete this comment?")) {
                        const { error } = await deleteComment(id);
                        if (!error) {
                            allComments = allComments.filter(c => c.id !== id);
                            selectedIds.delete(id);
                            renderTable();
                        }
                    }
                });
            });
        }

        function updateLocalStatusAndRender(id, status) {
            const comment = allComments.find(c => c.id === id);
            if (comment) comment.status = status;
            renderTable();
        }
    </script>
</body>

</html>
