<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - Ace Admin</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="dashboard-body" style="display: none;">

    <aside class="dashboard-sidebar">
        <div class="sidebar-header">
            <i class="fas fa-layer-group text-orange" style="font-size: 1.5rem;"></i>
            <a href="/public/index.html" class="sidebar-brand" target="_blank">Ace Admin</a>
        </div>
        
        <div class="sidebar-nav">
            <div class="nav-section-title">Core</div>
            <a href="/dashboard/index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="/dashboard/editor.html" class="nav-item"><i class="fas fa-pen-nib"></i> Write Post</a>
            
            <div class="nav-section-title">Community</div>
            <a href="/dashboard/subscribers.html" class="nav-item"><i class="fas fa-users"></i> Subscribers</a>
            <a href="/dashboard/newsletter.html" class="nav-item active"><i class="fas fa-paper-plane"></i> Newsletter</a>
            
            <div class="nav-section-title">Monetization</div>
            <a href="/dashboard/monetization.html" class="nav-item"><i class="fas fa-dollar-sign"></i> Sponsors</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <span class="text-secondary">Drafting new broadcast</span>
            </div>
            <div class="topbar-right">
                <button class="btn btn-outline text-sm"><i class="fas fa-vial"></i> Send Test</button>
                <button class="btn btn-primary text-sm" onclick="alert('Sending via Resend API...')"><i class="fas fa-paper-plane"></i> Send to All</button>
            </div>
        </header>

        <div class="dashboard-content">
            <h1 class="page-title mb-md">Compose Broadcast</h1>
            <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 2rem;">
                
                <!-- Composer -->
                <div class="panel">
                    <div class="panel-body flex-col gap-md">
                        <div>
                            <label class="form-label">Subject Line</label>
                            <input type="text" class="form-control" placeholder="The latest tech insights for you...">
                        </div>
                        <div>
                            <label class="form-label">Recipients</label>
                            <select class="form-control">
                                <option>All Active Subscribers (142)</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Message Body</label>
                            <textarea class="form-control" rows="15" placeholder="Write your email here..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- History -->
                <div class="panel">
                    <div class="panel-header"><h3 class="panel-title">Past Sends</h3></div>
                    <div class="panel-body flex-col gap-sm">
                        <div class="p-sm border rounded-md" style="padding:0.75rem; border:1px solid var(--border-color); border-radius: var(--border-radius-md);">
                            <div class="font-medium text-sm">October Tech Wrap-up</div>
                            <div class="text-xs text-secondary mb-sm">Sent Oct 1 - 120 recipients</div>
                            <div class="flex gap-sm">
                                <span class="badge" style="background: rgba(16,185,129,0.1); color: #10b981;">42% Open</span>
                                <span class="badge" style="background: rgba(59,130,246,0.1); color: #3b82f6;">12% Click</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script type="module">
        import { requireAuth } from '/js/auth.js';
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if(session) document.body.style.display = 'flex';
        });
    </script>
</body>
</html>
