<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Calendar - Ace Admin</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
        }
        .calendar-header {
            background-color: rgba(255,255,255,0.02);
            padding: 0.75rem;
            text-align: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
        }
        .calendar-day {
            background-color: var(--bg-secondary);
            min-height: 120px;
            padding: 0.5rem;
            position: relative;
            transition: background-color var(--transition-fast);
        }
        .calendar-day.drag-over {
            background-color: rgba(255, 138, 0, 0.1);
        }
        .calendar-day.other-month {
            opacity: 0.4;
        }
        .day-number {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .calendar-day.today .day-number {
            color: var(--brand-orange);
            background: rgba(255, 138, 0, 0.1);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .entry {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: grab;
            user-select: none;
        }
        .entry:active {
            cursor: grabbing;
        }
        .entry-idea { background: rgba(161, 161, 170, 0.1); color: var(--text-secondary); border-left: 2px solid var(--text-secondary); }
        .entry-draft { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-left: 2px solid #3b82f6; }
        .entry-scheduled { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-left: 2px solid #f59e0b; }
        .entry-published { background: rgba(16, 185, 129, 0.1); color: #10b981; border-left: 2px solid #10b981; }

        /* Backlog Area */
        .backlog-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            min-height: 60px;
            flex-wrap: wrap;
        }
        .backlog-area.drag-over {
            background-color: rgba(255, 138, 0, 0.1);
        }
    </style>
</head>
<body class="dashboard-body" style="display: none;">

    <aside class="dashboard-sidebar">
        <div class="sidebar-header">
            <i class="fas fa-layer-group text-orange" style="font-size: 1.5rem;"></i>
            <a href="/public/index.html" class="sidebar-brand" target="_blank">Ace Admin</a>
        </div>
        
        <div class="sidebar-nav">
            <div class="nav-section-title">Core</div>
            <a href="/dashboard/index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="/dashboard/editor.html" class="nav-item"><i class="fas fa-pen-nib"></i> Write Post</a>
            <a href="/dashboard/posts.html" class="nav-item"><i class="fas fa-file-alt"></i> All Posts</a>
            <a href="/dashboard/categories.html" class="nav-item"><i class="fas fa-folder"></i> Categories</a>
            
            <div class="nav-section-title">Growth & SEO</div>
            <a href="/dashboard/analytics.html" class="nav-item"><i class="fas fa-chart-line"></i> Analytics</a>
            <a href="/dashboard/keywords.html" class="nav-item"><i class="fas fa-key"></i> Keywords</a>
            <a href="/dashboard/calendar.html" class="nav-item active"><i class="far fa-calendar-alt"></i> Calendar</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <button class="btn btn-outline text-sm" id="prev-month"><i class="fas fa-chevron-left"></i></button>
                <span id="current-month-display" class="font-bold" style="margin: 0 1rem;"></span>
                <button class="btn btn-outline text-sm" id="next-month"><i class="fas fa-chevron-right"></i></button>
                <button class="btn btn-outline text-sm ml-sm" id="today-btn">Today</button>
            </div>
            <div class="topbar-right">
                <button class="btn btn-primary text-sm" onclick="openEntryModal()"><i class="fas fa-plus"></i> Add Entry</button>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="page-header flex justify-between items-end">
                <div>
                    <h1 class="page-title">Content Calendar</h1>
                    <p class="text-secondary">Schedule and pace your publishing cadence.</p>
                </div>
                <!-- Writing Goals Widget -->
                <div class="text-right" style="min-width: 250px;">
                    <div class="text-xs text-secondary mb-xs flex justify-between">
                        <span>Monthly Goal: <strong id="goal-count">0</strong> posts</span>
                        <a href="#" class="text-orange hover:underline" onclick="setGoal()">Edit</a>
                    </div>
                    <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; position: relative;">
                        <div id="goal-bar" style="height: 100%; width: 0%; background: #ff8a00; transition: width 0.3s ease;"></div>
                    </div>
                </div>
            </div>

            <!-- Calendar Display -->
            <div class="calendar-grid mb-md" id="calendar">
                <!-- Headers -->
                <div class="calendar-header">Sun</div>
                <div class="calendar-header">Mon</div>
                <div class="calendar-header">Tue</div>
                <div class="calendar-header">Wed</div>
                <div class="calendar-header">Thu</div>
                <div class="calendar-header">Fri</div>
                <div class="calendar-header">Sat</div>
            </div>

            <!-- Backlog -->
            <div>
                <h3 class="text-sm font-semibold mb-sm text-secondary">Idea Backlog (Drag to schedule)</h3>
                <div class="backlog-area" id="backlog" data-date="backlog">
                    <!-- Unscheduled items populate here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Entry Modal -->
    <div id="entry-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); width: 100%; max-width: 400px;">
            <div class="modal-header flex justify-between items-center" style="padding: 1.5rem; border-bottom: 1px solid var(--border-color);">
                <h2 class="text-xl font-bold">Calendar Entry</h2>
                <button onclick="closeModal()" class="text-secondary hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form id="entry-form" class="modal-body flex-col gap-sm" style="padding: 1.5rem;">
                <input type="hidden" id="entry-id">
                <div>
                    <label class="form-label">Title</label>
                    <input type="text" id="entry-title" class="form-control text-sm" required>
                </div>
                <div>
                    <label class="form-label">Status</label>
                    <select id="entry-status" class="form-control text-sm">
                        <option value="idea">Idea (Backlog)</option>
                        <option value="draft">Drafting</option>
                        <option value="scheduled">Scheduled</option>
                        <option value="published">Published</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Date</label>
                    <input type="date" id="entry-date" class="form-control text-sm">
                </div>
                <div class="flex gap-sm mt-sm">
                    <button type="button" class="btn btn-outline flex-grow" id="entry-delete" style="color: var(--text-red); border-color: rgba(239, 68, 68, 0.2);">Delete</button>
                    <button type="submit" class="btn btn-primary flex-grow">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { requireAuth } from '/js/auth.js';
        
        let currentDate = new Date();
        let currentDragElement = null;

        // Mock State (In production, replace with API calls to the calendar table created earlier)
        let calendarEntries = [
            { id: '1', title: 'Why GraphQL is dying', status: 'published', date: '2026-10-10' },
            { id: '2', title: 'Vue 4.0 First Look', status: 'scheduled', date: '2026-10-22' },
            { id: '3', title: 'Top 10 Tailwind Tricks', status: 'draft', date: '2026-10-15' },
            { id: '4', title: 'Is Web3 actually dead?', status: 'idea', date: null }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if(!session) return;
            document.body.style.display = 'flex';

            updateGoalWidget();
            renderCalendar(currentDate);

            // Bind Navigation
            document.getElementById('prev-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar(currentDate);
            });
            document.getElementById('next-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar(currentDate);
            });
            document.getElementById('today-btn').addEventListener('click', () => {
                currentDate = new Date();
                renderCalendar(currentDate);
            });

            // Bind Form
            document.getElementById('entry-form').addEventListener('submit', handleSaveEntry);
            document.getElementById('entry-delete').addEventListener('click', handleDeleteEntry);

            // Bind Drop Zone for Backlog
            const backlog = document.getElementById('backlog');
            backlog.addEventListener('dragover', e => { e.preventDefault(); backlog.classList.add('drag-over'); });
            backlog.addEventListener('dragleave', () => backlog.classList.remove('drag-over'));
            backlog.addEventListener('drop', handleDrop);
        });

        function renderCalendar(dateObj) {
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth();
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('current-month-display').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const calendar = document.getElementById('calendar');
            // Remove previous days but keep headers
            while (calendar.children.length > 7) {
                calendar.removeChild(calendar.lastChild);
            }

            const today = new Date();
            const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;

            for (let i = 0; i < firstDay; i++) {
                const dayNum = daysInPrevMonth - firstDay + i + 1;
                calendar.appendChild(createDay(dayNum, true));
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const isToday = isCurrentMonth && today.getDate() === i;
                const dDateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                const d = createDay(i, false, isToday, dDateStr);
                
                calendarEntries.filter(e => e.date === dDateStr).forEach(entry => {
                    d.appendChild(createEntryElement(entry));
                });
                
                calendar.appendChild(d);
            }

            renderBacklog();
        }

        function renderBacklog() {
            const backlog = document.getElementById('backlog');
            backlog.innerHTML = '';
            calendarEntries.filter(e => !e.date).forEach(entry => {
                backlog.appendChild(createEntryElement(entry));
            });
            if(backlog.children.length === 0) {
                backlog.innerHTML = '<span class="text-xs text-secondary italic self-center">No backlog items.</span>';
            }
        }

        function createDay(num, isOther, isToday = false, dateStr = null) {
            const d = document.createElement('div');
            d.className = 'calendar-day';
            if (isOther) d.classList.add('other-month');
            if (isToday) d.classList.add('today');
            if (dateStr) d.setAttribute('data-date', dateStr);
            
            d.innerHTML = `<div class="day-number">${num}</div>`;

            // Drop zone bindings
            if (dateStr) {
                d.addEventListener('dragover', e => { e.preventDefault(); d.classList.add('drag-over'); });
                d.addEventListener('dragleave', () => d.classList.remove('drag-over'));
                d.addEventListener('drop', handleDrop);
            }

            return d;
        }

        function createEntryElement(entry) {
            const el = document.createElement('div');
            el.className = `entry entry-${entry.status}`;
            el.textContent = entry.title;
            el.draggable = true;
            el.setAttribute('data-id', entry.id);

            el.addEventListener('dragstart', (e) => {
                currentDragElement = entry;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => el.style.opacity = '0.5', 0);
            });
            el.addEventListener('dragend', () => {
                el.style.opacity = '1';
                currentDragElement = null;
            });
            el.addEventListener('click', () => {
                openEntryModal(entry);
            });
            return el;
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            if (currentDragElement) {
                const newDate = this.getAttribute('data-date');
                // Update Data
                const entry = calendarEntries.find(i => i.id === currentDragElement.id);
                if (entry) {
                    entry.date = newDate === 'backlog' ? null : newDate;
                    if(newDate === 'backlog' && entry.status === 'scheduled') entry.status = 'idea';
                }
                // Save to API (mocked)
                // await updateCalendarEntry(...)
                
                renderCalendar(currentDate);
                updateGoalWidget();
            }
        }

        window.openEntryModal = (entry = null) => {
            document.getElementById('entry-modal').style.display = 'flex';
            if (entry) {
                document.getElementById('entry-id').value = entry.id;
                document.getElementById('entry-title').value = entry.title;
                document.getElementById('entry-status').value = entry.status;
                document.getElementById('entry-date').value = entry.date || '';
                document.getElementById('entry-delete').style.display = 'block';
            } else {
                document.getElementById('entry-form').reset();
                document.getElementById('entry-id').value = '';
                document.getElementById('entry-delete').style.display = 'none';
            }
        };

        window.closeModal = () => {
            document.getElementById('entry-modal').style.display = 'none';
        };

        function handleSaveEntry(e) {
            e.preventDefault();
            const id = document.getElementById('entry-id').value;
            const data = {
                title: document.getElementById('entry-title').value,
                status: document.getElementById('entry-status').value,
                date: document.getElementById('entry-date').value || null
            };

            if (id) {
                const index = calendarEntries.findIndex(i => i.id === id);
                calendarEntries[index] = { ...calendarEntries[index], ...data };
            } else {
                data.id = Math.random().toString();
                calendarEntries.push(data);
            }

            closeModal();
            renderCalendar(currentDate);
            updateGoalWidget();
        }

        function handleDeleteEntry() {
            const id = document.getElementById('entry-id').value;
            if (confirm("Delete this calendar entry?")) {
                calendarEntries = calendarEntries.filter(e => e.id !== id);
                closeModal();
                renderCalendar(currentDate);
            }
        }

        window.setGoal = () => {
            const current = localStorage.getItem('monthly_post_goal') || '4';
            const newGoal = prompt("Target number of posts this month?", current);
            if (newGoal && !isNaN(newGoal)) {
                localStorage.setItem('monthly_post_goal', newGoal);
                updateGoalWidget();
            }
        };

        function updateGoalWidget() {
            const goal = parseInt(localStorage.getItem('monthly_post_goal') || '4');
            document.getElementById('goal-count').textContent = goal;

            // In real app, query `posts` table for where published_at is within this month
            // Here we count the ones in our mock state
            const currentMonthStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).toISOString();
            const currentMonthEnd = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).toISOString();
            
            const publishedThisMonth = calendarEntries.filter(e => e.status === 'published' && e.date >= currentMonthStart.split('T')[0] && e.date <= currentMonthEnd.split('T')[0]).length;
            
            const pct = Math.min(100, Math.round((publishedThisMonth / goal) * 100));
            document.getElementById('goal-bar').style.width = pct + '%';
        }
    </script>
</body>
</html>
